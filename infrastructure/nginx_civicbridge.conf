# ============================================================
# CivicBridge Nginx Configuration
# Reverse proxy to FastAPI (uvicorn :8000)
# Static files from frontend/out/
# ============================================================

upstream civicbridge_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # Replace with your domain: api.civicbridge.org

    # ── Redirect HTTP → HTTPS (uncomment after certbot) ──
    # return 301 https://$host$request_uri;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.amazonaws.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── API Proxy ──
    location /api/ {
        proxy_pass http://civicbridge_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (generous for Whisper STT)
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # File upload limits (for photos / audio)
        client_max_body_size 25M;
    }

    # ── FastAPI docs ──
    location /docs {
        proxy_pass http://civicbridge_api/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://civicbridge_api/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Static Frontend ──
    location / {
        root /home/ubuntu/civic_bridge-proto/frontend/out;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Health check ──
    location /health {
        proxy_pass http://civicbridge_api/health;
        access_log off;
    }

    # ── Block dot-files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
