version: 1

frontend:
  phases:
    preBuild:
      commands:
        # Amplify executes phases as a single contiguous bash script.
        # Changing directory once here sets the PWD for the entire build.
        - cd frontend
        - npm ci
    build:
      commands:
        # Inject all NEXT_PUBLIC_ env vars at build time (Vite uses VITE_ prefix but leaving these just in case)
        - echo "VITE_API_URL=$NEXT_PUBLIC_API_URL" >> .env.production
        - echo "VITE_AMPLIFY_APP_ID=$NEXT_PUBLIC_AMPLIFY_APP_ID" >> .env.production
        - echo "VITE_USER_POOL_ID=$NEXT_PUBLIC_USER_POOL_ID" >> .env.production
        - echo "VITE_USER_POOL_CLIENT_ID=$NEXT_PUBLIC_USER_POOL_CLIENT_ID" >> .env.production
        - echo "VITE_S3_BUCKET=$NEXT_PUBLIC_S3_BUCKET" >> .env.production
        - echo "VITE_REGION=$NEXT_PUBLIC_REGION" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*

  customHeaders:
    - pattern: "**/*"
      headers:
        - key: X-Frame-Options
          value: SAMEORIGIN
        - key: X-Content-Type-Options
          value: nosniff
        - key: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
